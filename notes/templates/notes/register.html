<!DOCTYPE html>
<html lang="en">
<head>
    <title>Register | KnowledgeHub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(135deg,#4e73df,#1cc88a);
            height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            font-family: Arial, Helvetica, sans-serif;
        }

        .register-card{
            width:420px;
            border-radius:12px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        .register-header{
            text-align:center;
            margin-bottom:20px;
        }

        .register-header h3{
            font-weight:600;
        }

        .brand-title{
            font-size:22px;
            font-weight:bold;
            color:#4e73df;
        }

        .btn-register{
            width:100%;
            font-weight:500;
        }

    </style>

</head>

<body>

<div class="card register-card p-4">

    <div class="register-header">
        <div class="brand-title">NotesHub</div>
        <p class="text-muted">Create your account</p>
    </div>
    {% if error %}
<div class="alert alert-danger">
    {{ error }}
</div>
{% endif %}
    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Enter username">
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" placeholder="Enter email">
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password1" class="form-control" placeholder="Create password">
        </div>

        <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input type="password" name="password2" class="form-control" placeholder="Confirm password">
        </div>

        <button type="submit" class="btn btn-success btn-register">
            Create Account
        </button>

    </form>

    <hr>

    <p class="text-center">
        Already have an account?
        <a href="/login/">Login</a>
    </p>

</div>

</body>
</html>
